name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --coverage

      - name: E2E tests
        run: npm run test:e2e

  deploy:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry canvasmcpacr \
            --image canvasmcp:${{ github.sha }} \
            --image canvasmcp:latest \
            .

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group canvasmcp-rg \
            --name canvasmcp-aks \
            --overwrite-existing

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/canvasmcp \
            canvasmcp=canvasmcpacr.azurecr.io/canvasmcp:${{ github.sha }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/canvasmcp --timeout=120s
